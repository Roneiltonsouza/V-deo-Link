<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vídeo Link - Oficial</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: linear-gradient(135deg, #800080, #FF4500, #FF0000); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .container { background: rgba(0,0,0,0.4); padding: 40px; border-radius: 25px; backdrop-filter: blur(10px); text-align: center; width: 90%; max-width: 400px; border: 1px solid rgba(255,255,255,0.2); }
        .btn-main { background: white; color: #FF4500; padding: 20px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.3s; display: inline-block; }
        #fileInput { display: none; }
        #status { margin-top: 25px; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 10px; margin-top: 15px; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>VÍDEO LINK</h1>
        <label for="fileInput" class="btn-main">ADICIONAR VÍDEO</label>
        <input type="file" id="fileInput" accept="video/*">
        <div id="status">Aguardando arquivo...</div>
    </div>

    <script>
        const cloudName = "daiq3g0sk";
        const uploadPreset = "ml_default"; 

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const status = document.getElementById('status');
            if(!file) return;

            status.innerText = "🚀 Enviando... Não feche a página.";

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', uploadPreset);

            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/video/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if(data.secure_url) {
                    status.innerHTML = `✅ Sucesso!<br><input type="text" value="${data.secure_url}" readonly onclick="this.select()">`;
                } else {
                    status.innerText = "❌ Erro: Verifique se o preset está como 'Unsigned'.";
                    console.log(data);
                }
            } catch (err) {
                status.innerText = "❌ Erro de conexão.";
            }
        });
    </script>
</body>
</html>
