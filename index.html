<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vídeo Link - Direto</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: linear-gradient(135deg, #800080, #FF4500, #FF0000); height: 100vh; display: flex; align-items: center; justify-content: center; color: white; }
        .container { background: rgba(0,0,0,0.4); padding: 40px; border-radius: 25px; backdrop-filter: blur(10px); text-align: center; width: 90%; max-width: 400px; }
        .btn-main { background: white; color: #FF4500; padding: 20px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.3s; display: inline-block; }
        #fileInput { display: none; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>VÍDEO LINK</h1>
        <label for="fileInput" class="btn-main">ESCOLHER VÍDEO</label>
        <input type="file" id="fileInput" accept="video/mp4">
        <div id="status">Selecione um arquivo para começar.</div>
    </div>

    <script>
        const CLOUD_NAME = "daiq3g0sk"; // Seu Cloud Name
        const UPLOAD_PRESET = "ml_default"; // Preset padrão da Cloudinary (certifique-se que está ativado no seu painel)

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const status = document.getElementById('status');
            if(!file) return;

            status.innerText = "Enviando para a nuvem...";

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);

            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/video/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if(data.secure_url) {
                    status.innerHTML = `Sucesso!<br><input type="text" value="${data.secure_url}" readonly style="width:100%; margin-top:10px;">`;
                } else {
                    status.innerText = "Erro ao enviar: " + (data.error?.message || "Verifique o upload_preset");
                }
            } catch (err) {
                status.innerText = "Erro de conexão.";
            }
        });
    </script>
</body>
</html>
