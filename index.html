<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo Link - Pronto</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .container { background: #333; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 400px; }
        .btn-main { background: #FF4500; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #fileInput { display: none; }
        #status { margin-top: 20px; word-break: break-all; }
        input { width: 100%; margin-top: 10px; padding: 10px; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>VÍDEO LINK</h1>
        <label for="fileInput" class="btn-main">SELECIONAR VÍDEO</label>
        <input type="file" id="fileInput" accept="video/mp4">
        <div id="status">Aguardando arquivo...</div>
    </div>

    <script>
        const cloudName = "daiq3g0sk";
        const uploadPreset = "ml_default"; 

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const status = document.getElementById('status');
            if(!file) return;

            status.innerText = "🚀 Enviando... Aguarde a finalização.";

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', uploadPreset);

            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/video/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                if(data.secure_url) {
                    status.innerHTML = `✅ Link Gerado:<br><input type="text" value="${data.secure_url}" readonly onclick="this.select()">`;
                } else {
                    status.innerText = "❌ Erro: " + (data.error?.message || "Verifique o preset 'ml_default'");
                }
            } catch (err) {
                status.innerText = "❌ Erro de conexão.";
            }
        });
    </script>
</body>
</html>
