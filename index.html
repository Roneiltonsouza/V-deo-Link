<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo Link</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        .box { background: #333; padding: 30px; border-radius: 20px; text-align: center; width: 80%; max-width: 400px; }
        .btn { background: #FF4500; padding: 15px 30px; border-radius: 10px; cursor: pointer; display: inline-block; font-weight: bold; }
        #fileInput { display: none; }
        input[type="text"] { width: 90%; margin-top: 20px; padding: 10px; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <div class="box">
        <h1>VÍDEO LINK</h1>
        <label for="fileInput" class="btn">SELECIONAR VÍDEO</label>
        <input type="file" id="fileInput" accept="video/*">
        <div id="status" style="margin-top:20px;">Aguardando...</div>
        <div id="result" style="display:none;">
            <input type="text" id="finalUrl" readonly>
        </div>
    </div>

    <script>
        const cloudName = "daiq3g0sk";
        const preset = "ml_default";

        document.getElementById('fileInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            
            status.innerText = "Enviando... não saia da página.";
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', preset);

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/video/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if(data.secure_url) {
                    status.innerText = "✅ Sucesso!";
                    document.getElementById('finalUrl').value = data.secure_url;
                    result.style.display = "block";
                } else {
                    status.innerText = "Erro: " + (data.error?.message || "Verifique o preset 'Unsigned'");
                }
            } catch(err) {
                status.innerText = "Erro de conexão.";
            }
        });
    </script>
</body>
</html>
