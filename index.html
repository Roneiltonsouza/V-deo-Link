<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeo Link - Sistema Inteligente</title>
    <style>
        /* TEMA DE CORES DEGRADÊ: ROXO, LARANJA E VERMELHO */
        :root {
            --gradient: linear-gradient(135deg, #800080 0%, #FF4500 50%, #FF0000 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--gradient);
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        /* Container de Vidro (Glassmorphism) */
        .app-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -2px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }

        p {
            margin-bottom: 40px;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Botão de Ação - Visibilidade Máxima */
        .btn-main {
            background-color: #ffffff;
            color: #FF4500;
            padding: 20px 45px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            border: none;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            text-transform: uppercase;
        }

        .btn-main:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }

        #fileInput { display: none; }

        /* Área de Status e Resultados */
        .status-box { margin-top: 30px; font-weight: 600; }

        .result-area {
            margin-top: 25px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            display: none;
        }

        .result-area input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-top: 10px;
            text-align: center;
            font-family: monospace;
        }

        /* Escondendo barra de busca conforme solicitado */
        .search-bar { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>VÍDEO LINK</h1>
        <p>Gerador Inteligente de URL M3U8 HTTPS</p>

        <label for="fileInput" class="btn-main" id="mainLabel">
            Adicionar Vídeo
        </label>
        <input type="file" id="fileInput" accept="video/mp4">

        <div id="status" class="status-box">Aguardando arquivo MP4...</div>

        <div id="resultArea" class="result-area">
            <span>URL M3U8 Válida:</span>
            <input type="text" id="urlResult" readonly>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const resultArea = document.getElementById('resultArea');
        const urlResult = document.getElementById('urlResult');
        const mainLabel = document.getElementById('mainLabel');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            status.innerText = "Processando vídeo inteligente... Por favor, aguarde.";
            mainLabel.innerText = "PROCESSANDO...";
            mainLabel.style.opacity = "0.6";

            const formData = new FormData();
            formData.append('video', file);

            try {
                // Endpoint da sua API de processamento (deve ser configurado no README)
                const response = await fetch('https://SUA-API-DE-PROCESSAMENTO.com/api/v1/convert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Falha no sistema');

                const data = await response.json();

                // Sucesso: Exibe o link M3U8 HTTPS gerado
                status.innerText = "✔ Link Gerado com Sucesso!";
                resultArea.style.display = "block";
                urlResult.value = data.m3u8_url;
                mainLabel.innerText = "CONCLUÍDO";
                mainLabel.style.opacity = "1";

            } catch (err) {
                status.innerText = "Erro: Servidor de processamento indisponível.";
                mainLabel.innerText = "TENTAR NOVAMENTE";
                mainLabel.style.opacity = "1";
            }
        });
    </script>
</body>
  </html>
